name: Frontend CI

on:
  workflow_dispatch:
  push:
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tsconfig*.json"
      - "tailwind.config.ts"
      - "postcss.config.js"
      - "index.html"
      - ".github/workflows/frontend-ci.yml"
      - "lefthook.yml"
  pull_request:
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tsconfig*.json"
      - "tailwind.config.ts"
      - "postcss.config.js"
      - "index.html"
      - ".github/workflows/frontend-ci.yml"
      - "lefthook.yml"

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Analyze bundle
        run: npm run analyze
